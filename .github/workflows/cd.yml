name: CD Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 12m
          script: |
            set -euo pipefail
            export DEPLOY_REPO_DIR="${{ vars.DEPLOY_REPO_DIR || '/opt/AI-builders' }}"
            export DEPLOY_BRANCH=main
            bash "${DEPLOY_REPO_DIR}/deploy/deploy.sh"
