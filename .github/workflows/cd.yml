name: CD Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 40m
          script: |
            set -euo pipefail
            export DEPLOY_REPO_DIR="${{ vars.DEPLOY_REPO_DIR || '/opt/AI-builders' }}"
            export DEPLOY_BRANCH=main
            # 先拉取最新代码，避免服务器上旧的 deploy.sh 在 pull 前做文件检查导致死锁
            if [[ -d "${DEPLOY_REPO_DIR}/.git" ]]; then
              git -C "${DEPLOY_REPO_DIR}" fetch origin main
              git -C "${DEPLOY_REPO_DIR}" checkout main
              git -C "${DEPLOY_REPO_DIR}" reset --hard origin/main
            fi
            bash "${DEPLOY_REPO_DIR}/deploy/deploy.sh"
