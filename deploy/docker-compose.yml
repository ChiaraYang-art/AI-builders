name: ai-builders

services:
  sprout-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: ai-builders-sprout-server:latest
    container_name: sprout-server
    restart: unless-stopped
    ports:
      - "${SPROUT_PORT:-5000}:5000"
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/latest', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
