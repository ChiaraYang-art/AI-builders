name: ai-builders

services:
  sprout-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: ai-builders-sprout-server:latest
    container_name: sprout-server
    restart: unless-stopped
    ports:
      - "${SPROUT_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_WS_URL: ${DASHSCOPE_WS_URL:-wss://dashscope.aliyuncs.com/api-ws/v1/inference}
      DASHSCOPE_TTS_MODEL: ${DASHSCOPE_TTS_MODEL:-cosyvoice-v3-flash}
      DASHSCOPE_TTS_VOICE: longhuhu_v3
    volumes:
      - sprout-generated:/app/backend/generated
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/latest', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sprout-generated:
