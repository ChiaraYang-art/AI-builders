<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>City Sprout Section 2 Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="phone" aria-label="City Sprout Section 2 demo">
        <div id="app" class="screen"></div>
      </section>

      <aside class="demo-notes">
        <p class="eyebrow">Section 2 Demo</p>
        <h1>出走小芽 App Demo</h1>
        <p>
          这版按照 Figma 的「Section 2-元素命名方便codex识别」开发。
          第一屏点击“小芽说话框”，会随机进入 light walk、sound walk、
          color walk 或 local discovery 四种出门邀请。
        </p>
        <div class="legend">
          <button type="button" data-jump="home">回到第一屏</button>
          <button type="button" data-jump="diary">查看日记</button>
          <button type="button" data-jump="nearby">查看附近</button>
        </div>
      </aside>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
